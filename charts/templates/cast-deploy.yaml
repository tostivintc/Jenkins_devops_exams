apiVersion: apps/v1
kind: Deployment
metadata:
  name: cast
  labels:
    app: cast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cast
  template:
    metadata:
      labels:
        app: cast
    spec:
      containers:
        - name: cast
          image: cyriltostivint/cast-service:{{ .Values.image.tag }}
          imagePullPolicy: IfNotPresent
          command: ["uvicorn"]
          args:
            ["app.main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - name: DATABASE_URI
              value: postgresql://cast_db_username:cast_db_password@cast-db/cast_db_dev
          ports:
            - containerPort: 8000
