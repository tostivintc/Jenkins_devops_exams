apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: movie-db
spec:
  selector:
    matchLabels:
      app: movie-db
  serviceName: "movie-db"
  replicas: 1
  template:
    metadata:
      labels:
        app: movie-db
    spec:
      containers:
        - name: movie-db
          image: postgres:12.1-alpine
          env:
            - name: "POSTGRES_USER"
              value: "movie_db_username"
            - name: "POSTGRES_DB"
              value: "movie_db_dev"
          envFrom:
            - secretRef:
                name: movie-db-secret
          volumeMounts:
            - mountPath: "/var/lib/postgresql/data/"
              name: movie-storage
  volumeClaimTemplates:
    - metadata:
        name: movie-storage
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: "local-path"
        resources:
          requests:
            storage: 1Gi
