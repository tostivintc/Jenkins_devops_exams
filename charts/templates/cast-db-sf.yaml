apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cast-db
spec:
  selector:
    matchLabels:
      app: cast-db
  serviceName: "cast-db"
  replicas: 1
  template:
    metadata:
      labels:
        app: cast-db
    spec:
      containers:
        - name: cast-db
          image: postgres:12.1-alpine
          env:
            - name: "POSTGRES_USER"
              value: "cast_db_username"
            - name: "POSTGRES_DB"
              value: "cast_db_dev"
          envFrom:
            - secretRef:
                name: cast-db-secret
          volumeMounts:
            - mountPath: "/var/lib/postgresql/data/"
              name: cast-storage
  volumeClaimTemplates:
    - metadata:
        name: cast-storage
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: "local-path"
        resources:
          requests:
            storage: 100Mi
